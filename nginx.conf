server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Canonicaliza o host: domínio nu -> www (HTTP->HTTPS é tratado pelo proxy do Easypanel;
    # ativar também "Redirect to HTTPS" no domínio dentro do Easypanel)
    if ($host = 'cprojetos.com.br') {
        return 301 https://www.cprojetos.com.br$request_uri;
    }

    # --- Headers de segurança (repetidos nos locations por causa da herança do nginx) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://complementare-umami.twaehz.easypanel.host; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://complementare-umami.twaehz.easypanel.host; frame-src https://app.speckle.systems; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Compacta os arquivos para carregar mais rápido
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache longo para imagens/fontes; o HTML nunca fica em cache "preso"
    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
    # CSS versionado por ?v=N: cache longo, troca de versão invalida
    location ~* \.css$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        # --- Headers de segurança (repetidos nos locations por causa da herança do nginx) ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://complementare-umami.twaehz.easypanel.host; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://complementare-umami.twaehz.easypanel.host; frame-src https://app.speckle.systems; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }

    # Ícones servidos como arquivo real (nunca caem na home)
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /favicon-32.png { access_log off; }
    location = /apple-touch-icon.png { access_log off; }

    # Permite acessar /portfolio em vez de /portfolio.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Página de erro 404 real (não devolve a home como erro)
    error_page 404 /404.html;
    location = /404.html { internal; }
}
