server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compacta os arquivos para carregar mais rápido
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache longo para imagens/fontes; o HTML nunca fica em cache "preso"
    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Permite acessar /portfolio em vez de /portfolio.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Página de erro amigável cai na home
    error_page 404 /index.html;
}
